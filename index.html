<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Boujee Bazar</title>
  <meta name="description" content="The Boujee Bazar - Your one-stop destination for premium fashion, jewelry, watches and accessories." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

  <!-- Boujee Bazar CSS -->
  <link rel="stylesheet" href="/assets/css/flaticon_glamer.css" />
  <link rel="stylesheet" href="/assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/css/splide.min.css" />
  <link rel="stylesheet" href="/assets/css/swiper-bundle.min.css" />
  <link rel="stylesheet" href="/assets/css/slimselect.css" />
  <link rel="stylesheet" href="/assets/css/animate.min.css" />
  <link rel="stylesheet" href="/assets/css/nouislider.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <link rel="stylesheet" href="/assets/css/banner.css" />
</head>

<body>
  <div id="root"></div>

  <!-- Boujee Bazar Vendor JS -->
  <script src="/assets/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/splide.min.js"></script>
  <script src="/assets/js/splide-extension-auto-scroll.min.js"></script>
  <script src="/assets/js/swiper-bundle.min.js"></script>
  <script src="/assets/js/slimselect.min.js"></script>
  <script src="/assets/js/wow.min.js"></script>
  <script src="/assets/js/mixitup.min.js"></script>
  <script src="/assets/js/fslightbox.js"></script>
  <script src="/assets/js/nouislider.min.js"></script>
  <script src="/assets/js/countdown.js"></script>

  <script type="module" src="/src/main.jsx"></script>

  <!-- main.js runs after React mounts via a MutationObserver so all elements exist -->
  <script>
    (function() {
      function initMain() {
        // sticky header
        var headerBottom = document.querySelector('.ul-header-bottom');
        if (headerBottom) {
          window.addEventListener('scroll', function() {
            headerBottom.classList.toggle('is-sticky', window.scrollY > 150);
          });
        }

        // mobile search
        var searchOpener = document.querySelector('.ul-header-mobile-search-opener');
        var searchCloser = document.querySelector('.ul-header-mobile-search-closer');
        var searchWrapper = document.querySelector('.ul-header-search-form-wrapper');
        if (searchOpener && searchWrapper) {
          searchOpener.addEventListener('click', function() { searchWrapper.classList.add('active'); });
        }
        if (searchCloser && searchWrapper) {
          searchCloser.addEventListener('click', function() { searchWrapper.classList.remove('active'); });
        }

        // sidebar opener/closer
        var sidebar = document.querySelector('.ul-sidebar');
        var opener  = document.querySelector('.ul-header-sidebar-opener');
        var closer  = document.querySelector('.ul-sidebar-closer');
        if (opener && sidebar) opener.addEventListener('click', function() { sidebar.classList.add('active'); });
        if (closer && sidebar) closer.addEventListener('click', function() { sidebar.classList.remove('active'); });

        // header top splide
        if (window.Splide && document.querySelector('.ul-header-top-slider')) {
          try {
            new Splide('.ul-header-top-slider', {
              arrows: false, pagination: false, type: 'loop',
              drag: 'free', focus: 'center', perPage: 9,
              autoWidth: true, gap: 15,
              autoScroll: { speed: 1.5 },
            }).mount(window.splide ? window.splide.Extensions : {});
          } catch(e) {}
        }

        // trust bar slider
        if (window.Swiper && document.querySelector('.ul-trust-slider')) {
          try {
            new Swiper('.ul-trust-slider', {
              slidesPerView: 2, loop: true,
              autoplay: { delay: 850, disableOnInteraction: false },
              speed: 800, spaceBetween: 10,
              breakpoints: { 576: { enabled: false } }
            });
          } catch(e) {}
        }

        // products slider 1
        if (window.Swiper && document.querySelector('.ul-products-slider-1')) {
          try {
            new Swiper('.ul-products-slider-1', {
              slidesPerView: 3, loop: true, autoplay: true, spaceBetween: 15,
              navigation: { nextEl: '.ul-products-slider-1-nav .next', prevEl: '.ul-products-slider-1-nav .prev' },
              breakpoints: {
                0: { slidesPerView: 2 }, 480: { slidesPerView: 2 }, 992: { slidesPerView: 3 },
                1200: { spaceBetween: 20, slidesPerView: 4 }, 1400: { spaceBetween: 22, slidesPerView: 4 },
                1600: { spaceBetween: 26, slidesPerView: 4 }, 1700: { spaceBetween: 30, slidesPerView: 4 }
              }
            });
          } catch(e) {}
        }

        // products slider 2
        if (window.Swiper && document.querySelector('.ul-products-slider-2')) {
          try {
            new Swiper('.ul-products-slider-2', {
              slidesPerView: 3, loop: true, autoplay: true, spaceBetween: 15,
              navigation: { nextEl: '.ul-products-slider-2-nav .next', prevEl: '.ul-products-slider-2-nav .prev' },
              breakpoints: {
                0: { slidesPerView: 2 }, 480: { slidesPerView: 2 }, 992: { slidesPerView: 3 },
                1200: { spaceBetween: 20, slidesPerView: 4 }, 1400: { spaceBetween: 22, slidesPerView: 4 },
                1600: { spaceBetween: 26, slidesPerView: 4 }, 1700: { spaceBetween: 30, slidesPerView: 4 }
              }
            });
          } catch(e) {}
        }

        // flash sale slider
        if (window.Swiper && document.querySelector('.ul-flash-sale-slider')) {
          try {
            new Swiper('.ul-flash-sale-slider', {
              slidesPerView: 1, loop: true, autoplay: true, spaceBetween: 15,
              breakpoints: {
                480: { slidesPerView: 2 }, 768: { slidesPerView: 3 },
                992: { slidesPerView: 4 }, 1200: { spaceBetween: 20, slidesPerView: 4 },
                1680: { spaceBetween: 26, slidesPerView: 4 }, 1700: { spaceBetween: 30, slidesPerView: 4.7 }
              }
            });
          } catch(e) {}
        }

        // reviews slider
        if (window.Swiper && document.querySelector('.ul-reviews-slider')) {
          try {
            new Swiper('.ul-reviews-slider', {
              slidesPerView: 1, loop: true, autoplay: true, spaceBetween: 15,
              breakpoints: {
                768: { slidesPerView: 2 }, 992: { spaceBetween: 20, slidesPerView: 3 },
                1200: { spaceBetween: 20, slidesPerView: 4 }, 1680: { slidesPerView: 4, spaceBetween: 26 },
                1700: { slidesPerView: 4, spaceBetween: 30 }
              }
            });
          } catch(e) {}
        }

        // gallery slider
        if (window.Swiper && document.querySelector('.ul-gallery-slider')) {
          try {
            new Swiper('.ul-gallery-slider', {
              slidesPerView: 3.2, loop: true, freeMode: true,
              autoplay: { delay: 0, disableOnInteraction: false },
              speed: 3500, centeredSlides: false, spaceBetween: 15,
              breakpoints: {
                480: { slidesPerView: 4.2 }, 576: { slidesPerView: 5 },
                768: { slidesPerView: 6 }, 992: { spaceBetween: 20, slidesPerView: 7 },
                1400: { spaceBetween: 24, slidesPerView: 8 }, 1680: { spaceBetween: 26, slidesPerView: 8.5 },
                1700: { spaceBetween: 28, slidesPerView: 9 }, 1920: { spaceBetween: 30, slidesPerView: 9.5 }
              }
            });
          } catch(e) {}
        }

        // mixitup filter
        if (window.mixitup && document.querySelector('.ul-filter-products-wrapper')) {
          try { mixitup('.ul-filter-products-wrapper'); } catch(e) {}
        }

        // price filter slider (shop page)
        var priceSlider = document.getElementById('ul-products-price-filter-slider');
        if (priceSlider && window.noUiSlider && !priceSlider.noUiSlider) {
          noUiSlider.create(priceSlider, {
            start: [0, 2000], connect: true,
            range: { min: 0, max: 2000 }
          });
          priceSlider.noUiSlider.on('update', function(values, handle) {
            var val = Math.round(values[handle]);
            if (handle) {
              var el = document.querySelector('.filtered-price.increasing');
              if (el) el.textContent = '₹' + val;
            } else {
              var el = document.querySelector('.filtered-price.decreasing');
              if (el) el.textContent = '₹' + val;
            }
          });
        }

        // parallax on video cover
        var parallaxImg = document.querySelector('.ul-video-cover');
        if (parallaxImg) {
          var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              if (entry.isIntersecting) {
                window.addEventListener('scroll', doParallax);
                doParallax();
              } else {
                window.removeEventListener('scroll', doParallax);
              }
            });
          });
          obs.observe(parallaxImg);
          function doParallax() {
            var rect = parallaxImg.getBoundingClientRect();
            var offset = (rect.top + rect.height / 2 - window.innerHeight / 2) * -0.5;
            parallaxImg.style.transform = 'translateY(' + offset + 'px)';
          }
        }

        // Accordion is handled by React state in Home.jsx — skip here

        // SlimSelect for header search category
        if (window.SlimSelect && document.querySelector('#ul-header-search-category')) {
          try { new SlimSelect({ select: '#ul-header-search-category', settings: { showSearch: false } }); } catch(e) {}
        }

        // SlimSelect for checkout country
        if (window.SlimSelect && document.querySelector('#ul-checkout-country')) {
          try { new SlimSelect({ select: '#ul-checkout-country', settings: { showSearch: false } }); } catch(e) {}
        }

        // product details slider
        if (window.Swiper && document.querySelector('.ul-product-details-img-slider')) {
          try {
            new Swiper('.ul-product-details-img-slider', {
              slidesPerView: 1, loop: true, autoplay: true, spaceBetween: 0,
              navigation: {
                nextEl: '#ul-product-details-img-slider-nav .next',
                prevEl: '#ul-product-details-img-slider-nav .prev'
              }
            });
          } catch(e) {}
        }

        // category scroll buttons
        var catLeft  = document.getElementById('cat-scroll-left');
        var catRight = document.getElementById('cat-scroll-right');
        var catWrap  = document.getElementById('cat-scroll-wrapper');
        if (catLeft && catWrap)  catLeft.addEventListener('click',  function() { catWrap.scrollBy({ left: -250, behavior: 'smooth' }); });
        if (catRight && catWrap) catRight.addEventListener('click', function() { catWrap.scrollBy({ left:  250, behavior: 'smooth' }); });

        // fslightbox refresh
        if (window.refreshFsLightbox) window.refreshFsLightbox();
      }

      // Run after React has rendered: watch for #root to have children
      var rootEl = document.getElementById('root');
      var mo = new MutationObserver(function(mutations, observer) {
        if (rootEl.children.length > 0) {
          observer.disconnect();
          // Small delay so all components are mounted
          setTimeout(initMain, 300);
          // Also re-run on route changes (React SPA navigation)
          window.addEventListener('bb:page-ready', function() {
            setTimeout(initMain, 300);
          });
        }
      });
      mo.observe(rootEl, { childList: true });
    })();
  </script>
</body>

</html>
